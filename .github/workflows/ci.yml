name: CI

# Vitest + lint + tsc. Runs on every push to main and every PR
# targeting main. Decoupled from the Docker workflow so a slow
# image push never blocks the unit-test feedback loop.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Run vitest suite
        run: npm test
