name: CI

# Vitest + lint + tsc. Runs on every push to main and every PR
# targeting main. Decoupled from the Docker workflow so a slow
# image push never blocks the unit-test feedback loop.

on:
  push:
    branches: [main]
    tags: ['v*']
    # M-CI-COST-1: skip CI on planning-only commits.
    paths-ignore:
      - 'devplan/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'devplan/**'
  # M-CI-1: callable as a gate from docker-publish.yml.
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check + build
        run: npm run build

      - name: Run vitest suite
        run: npm test

  gitleaks:
    name: gitleaks (hard block)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan repository history
        run: gitleaks detect --source . --redact --verbose --exit-code 1
