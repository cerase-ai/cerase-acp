name: Build & publish Docker image

# Builds the cerase-acp Docker image and publishes it to the
# GitHub Container Registry (ghcr.io/cerase-ai/cerase-acp).
#
# Triggers:
#   - push to main           â†’ tags: latest, main, sha-<short>
#   - push of a `v*` git tag â†’ tags: <tag>, <semver>, latest (only if not pre-release)
#   - manual workflow_dispatch (any branch)
#
# M-CI-COST-2: the team pushes directly to main (PRs are dependabot-only) and
# the PR build was validation-only (no push) â€” the most expensive PR step.
# Dropped the pull_request trigger; a Dockerfile break is caught on merge to main.

on:
  push:
    branches: [main]
    tags: ['v*']
    # M-CI-COST-1: skip image builds on planning-only commits.
    paths-ignore:
      - 'devplan/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cerase-acp

# M-CI-1: serialise publishes per ref so two rapid pushes can't race
# and move :latest backwards.
# M-CI-COST-1: cancel superseded branch builds (cheaper + safer for :latest);
# tag builds must finish.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  # M-CI-1: gate the publish on a green suite. needs: only works within
  # one workflow, so call the reusable ci workflow and depend on it.
  gate:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: [gate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata + tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tagging strategy:
          #   - branch=main          â†’ tag `main` + tag `latest`
          #   - branch != main       â†’ tag `<branch-slug>`
          #   - git tag v1.2.3       â†’ tag `v1.2.3` + tag `1.2.3` + tag `1.2`
          #                             + tag `latest` (skipped on pre-release like v1.2.3-rc.1)
          #   - any commit           â†’ tag `sha-<7-char>`
          # `latest` is auto-managed: only attached to default branch +
          # to non-prerelease tags. PR builds get `pr-<n>` (no push anyway).
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=cerase-acp
            org.opencontainers.image.description=Multi-channel DM bridge for Cerase (Discord / Slack / Workspace Chat / Telegram)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build & push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use GitHub Actions cache so re-builds reuse npm install
          # + tsc compile layers when only source changes.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
